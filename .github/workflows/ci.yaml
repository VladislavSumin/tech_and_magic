name: ci

on:
  push:
    branches:
      - master


jobs:
  ci:
    name: ci
    runs-on: ubuntu-20.04
    timeout-minutes: 30
    steps:
      - name: Clone repository
        uses: actions/checkout@v3

      - name: Setup rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: nightly
      - name: Build project
        uses: actions-rs/cargo@v1
        with:
          command: build
          args: --release